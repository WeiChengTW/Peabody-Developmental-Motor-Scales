<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>測驗管理 | 兒童測驗平台</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="header">
    <div class="brand">兒童發展測驗平台</div>
    <div class="user-info">
      <span id="user-role-display">讀取身分中...</span>
      <button class="text-link" id="btn-logout">登出系統</button>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <select data-role="sel-name" style="width: 200px;">
          <option value="">載入受測者名單...</option>
        </select>
        <select data-role="sel-level" style="width: 200px;">
          <option value="">載入測驗項目...</option>
        </select>
        <button class="btn" data-action="clear-filter">清除條件</button>
        <div style="flex-grow: 1;"></div>
        <button class="btn primary" id="btn-add-record" data-action="new">新增紀錄</button>
      </div>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr>
            <th style="width: 140px;">操作區塊</th>
            <th>受測者編號</th>
            <th>受測者姓名</th>
            <th>測驗項目</th>
            <th>獲得分數</th>
            <th>測驗日期</th>
          </tr>
        </thead>
        <tbody data-role="tbody">
          <tr><td colspan="6" class="empty">系統資料載入中，請稍候...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <dialog id="record-dialog" data-role="dialog">
    <div class="dialog-header" id="dialog-title">新增紀錄</div>
    <div class="dialog-body">
      <div class="form-group" id="group-uid">
        <label>受測者編號 (UID) <span style="color:var(--danger)">*</span></label>
        <input type="text" data-field="userId" placeholder="請輸入測驗編號">
      </div>
      <div class="form-group">
        <label>小朋友姓名</label>
        <input type="text" data-field="name" placeholder="請輸入姓名">
      </div>
      <div class="form-group" id="group-birthday">
        <label>出生日期 (將作為家長登入密碼)</label>
        <input type="date" data-field="birthday">
      </div>

      <div id="task-fields">
        <hr style="border: 0; border-top: 2px dashed var(--border-color); margin: 24px 0;">
        <div class="form-group">
          <label>選擇測驗項目</label>
          <select data-field="level"></select>
        </div>
        <div class="form-group">
          <label>進行測驗的日期</label>
          <input type="date" data-field="test_date">
        </div>
        <div class="form-group">
          <label>測驗分數：<span id="score-display" style="font-weight:700; color:var(--secondary); font-size:18px;">0</span> 分</label>
          <input type="range" data-field="score" min="0" max="2" value="0">
        </div>
      </div>
    </div>
    <div class="dialog-footer">
      <button class="btn" onclick="document.getElementById('record-dialog').close()">取消返回</button>
      <button class="btn primary" data-action="save">確認並儲存</button>
    </div>
  </dialog>

  <script src="../js/admin.js"></script>
</body>
</html>
